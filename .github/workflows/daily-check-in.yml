name: Daily Check-in

on:
  schedule:
    #- cron: '0 1 * * *'  # 每天1点 UTC 时间执行
    - cron: '0 */12 * * *'  # 每12小时执行一次

  workflow_dispatch:

jobs:
  # 新增一个 Job 用于解析 Secrets 中的用户名字符串
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        shell: python  # <--- 关键点：告诉 GitHub 这步跑的是 Python
        run: |
          import os
          import json

          # 从环境变量获取原始数据（最安全，避免转义问题）
          raw_cookies = """${{ secrets.LINUXDO_COOKIES }}"""
          
          # 根据你的数据特征：Cookie 组之间是用 ",_t=" 这种形式连接的
          # 或者如果你的规则是简单的以逗号分隔多个账号：
          # 我们先处理掉可能存在的换行，再按逗号分割
          cookie_list = [c.strip() for c in raw_cookies.split(',') if c.strip()]
          
          # 生成 GitHub Actions 需要的 JSON 格式
          matrix_json = json.dumps(cookie_list)
          
          # 写入输出
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'matrix={matrix_json}\n')
          

  run_script:
    needs: prepare # 确保在解析完用户名后再运行
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        cookies: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4
      - uses: browser-actions/setup-chrome@v1
      - name: Check Chrome version
        run: chrome --version
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9.19'

      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute script
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          LINUXDO_USERNAME: ${{ secrets.LINUXDO_USERNAME }}
          LINUXDO_PASSWORD: ${{ secrets.LINUXDO_PASSWORD }}
          GOTIFY_URL: ${{ secrets.GOTIFY_URL }}
          GOTIFY_TOKEN: ${{ secrets.GOTIFY_TOKEN }}
          SC3_PUSH_KEY: ${{ secrets.SC3_PUSH_KEY }}
          WXPUSH_URL: ${{ secrets.WXPUSH_URL }}
          WXPUSH_TOKEN: ${{ secrets.WXPUSH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LINUXDO_COOKIES: ${{ matrix.cookies }}
          BROWSE_ENABLED: ${{ secrets.BROWSE_ENABLED }}
        run: |
          python main.py

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 10
          keep_minimum_runs: 6
