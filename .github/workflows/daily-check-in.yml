name: Daily Check-in

on:
  schedule:
    #- cron: '0 1 * * *'  # 每天1点 UTC 时间执行
    - cron: '0 */12 * * *'  # 每12小时执行一次

  workflow_dispatch:

jobs:
  # 新增一个 Job 用于解析 Secrets 中的用户名字符串
  prepare:
    runs-on: ubuntu-latest
    outputs:
      indices: ${{ steps.set-matrix.outputs.indices }}
    steps:
      - id: set-indices
        shell: python  # <--- 关键点：告诉 GitHub 这步跑的是 Python
        env:
          # 将 Secret 放入环境变量，避免 Python 解释时出现语法截断
          RAW_COOKIES: ${{ secrets.LINUXDO_COOKIES }}
        run: |
          import os
          import json
          
          raw_data = os.environ.get("RAW_COOKIES", "").strip()
          cookie_list = [c.strip() for c in raw_data.split(',') if c.strip()]
          
          # 只输出索引列表，如 [0, 1]
          indices = list(range(len(cookie_list)))
          
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"indices={json.dumps(indices)}\n")
          

  run_script:
    needs: prepare # 确保在解析完用户名后再运行
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        index: ${{ fromJson(needs.prepare.outputs.indices) }}

    steps:
      - uses: actions/checkout@v4
      - uses: browser-actions/setup-chrome@v1
      - name: Check Chrome version
        run: chrome --version
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9.19'

      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute script
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          LINUXDO_USERNAME: ${{ secrets.LINUXDO_USERNAME }}
          LINUXDO_PASSWORD: ${{ secrets.LINUXDO_PASSWORD }}
          GOTIFY_URL: ${{ secrets.GOTIFY_URL }}
          GOTIFY_TOKEN: ${{ secrets.GOTIFY_TOKEN }}
          SC3_PUSH_KEY: ${{ secrets.SC3_PUSH_KEY }}
          WXPUSH_URL: ${{ secrets.WXPUSH_URL }}
          WXPUSH_TOKEN: ${{ secrets.WXPUSH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # 依然传入完整的加密串
          ALL_COOKIES: ${{ secrets.LINUXDO_COOKIES }}
          # 传入当前矩阵的索引
          ACCOUNT_INDEX: ${{ matrix.index }}
          BROWSE_ENABLED: ${{ secrets.BROWSE_ENABLED }}
        run: |
          # 运行一个临时 Python 脚本来提取对应的 Cookie 并执行
          python -c "
          import os, subprocess
          index = int(os.environ['ACCOUNT_INDEX'])
          cookies_str = os.environ['ALL_COOKIES']
          # 按逗号分割，取当前索引对应的那个账号
          current_cookie = [c.strip() for c in cookies_str.split(',') if c.strip()][index]
          os.environ['LINUXDO_COOKIES'] = current_cookie
          # 调用你的主程序
          subprocess.run(['python', 'main.py'], env=os.environ)
          "

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 10
          keep_minimum_runs: 6
