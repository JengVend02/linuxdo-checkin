name: Daily Check-in

on:
  schedule:
    #- cron: '0 1 * * *'  # 每天1点 UTC 时间执行
    - cron: '0 */12 * * *'  # 每12小时执行一次

  workflow_dispatch:

jobs:
  # 新增一个 Job 用于解析 Secrets 中的用户名字符串
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        shell: python  # <--- 关键点：告诉 GitHub 这步跑的是 Python
        env:
          # 将 Secret 放入环境变量，避免 Python 解释时出现语法截断
          RAW_COOKIES: ${{ secrets.LINUXDO_COOKIES }}
        run: |
          import os
          import json
          import sys

          # 从环境变量获取，避免直接在 run 中导致的转义灾难
          raw_data = os.environ.get("RAW_COOKIES", "")
          
          if not raw_data:
              print("Error: LINUXDO_COOKIES is empty")
              sys.exit(1)

          # 解析逻辑：按逗号拆分多个账号
          # 处理可能存在的换行和空格
          cookie_list = [c.strip() for c in raw_data.split(',') if c.strip()]
          
          if not cookie_list:
              print("::error::No valid cookies found after splitting!")
              sys.exit(1)
          
          # 3. 序列化为 JSON 字符串
          matrix_json = json.dumps(cookie_list)
          
          # 4. 写入 GITHUB_OUTPUT (使用 a 模式追加)
          # 注意：变量名必须是 matrix，与 outputs 中的声明一致
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
              f.write(f"matrix={matrix_json}\n")
          
          # 5. 在日志中打印，方便你调试看输出是否正确
          print(f"Successfully generated matrix: {matrix_json}")
          

  run_script:
    needs: prepare # 确保在解析完用户名后再运行
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        cookies: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4
      - uses: browser-actions/setup-chrome@v1
      - name: Check Chrome version
        run: chrome --version
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9.19'

      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute script
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          LINUXDO_USERNAME: ${{ secrets.LINUXDO_USERNAME }}
          LINUXDO_PASSWORD: ${{ secrets.LINUXDO_PASSWORD }}
          GOTIFY_URL: ${{ secrets.GOTIFY_URL }}
          GOTIFY_TOKEN: ${{ secrets.GOTIFY_TOKEN }}
          SC3_PUSH_KEY: ${{ secrets.SC3_PUSH_KEY }}
          WXPUSH_URL: ${{ secrets.WXPUSH_URL }}
          WXPUSH_TOKEN: ${{ secrets.WXPUSH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LINUXDO_COOKIES: ${{ matrix.cookies }}
          BROWSE_ENABLED: ${{ secrets.BROWSE_ENABLED }}
        run: |
          python main.py

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 10
          keep_minimum_runs: 6
